server:
  version: "2.0.0"
  actor_id: "excelforge-runtime"

runtime:
  version: "2.0.0"
  pipe_name: "\\\\.\\pipe\\excelforge-runtime"
  data_dir: "./.runtime_data_v2"

excel:
  visible: true
  disable_events: true
  disable_alerts: true
  force_disable_macros: true
  health_ping_enabled: true
  max_rebuild_attempts: 3
  ensure_visibility: true

paths:
  allowed_roots:
    - "*"
  allowed_extensions:
    - ".xlsx"
    - ".xlsm"
    - ".xlsb"
    - ".xls"
    - ".bas"
    - ".cls"
  snapshots_dir: "./.runtime_data_v2/snapshots"
  backups_dir: "./.runtime_data_v2/backups"
  sqlite_path: "./.runtime_data_v2/excelforge.db"

limits:
  max_open_workbooks: 8
  max_read_cells: 10000
  max_write_cells: 10000
  max_copy_cells: 10000
  max_snapshot_cells: 10000
  default_read_rows: 200
  max_read_rows: 1000
  operation_timeout_seconds: 30
  max_create_sheets: 20
  max_insert_rows: 1000
  max_insert_columns: 100
  max_vba_code_size_bytes: 1048576
  calculation_timeout_seconds: 10

snapshot:
  max_per_workbook: 50
  max_total_size_mb: 200
  max_age_hours: 24
  cleanup_interval_ops: 100
  preview_token_ttl_minutes: 5

backup:
  max_per_workbook: 10
  max_total_size_mb: 500
  max_age_hours: 48
  confirm_token_ttl_minutes: 5

retention:
  audit_days: 30

vba_policy:
  enabled: true
  block_levels:
    - "critical"
    - "high"
  warn_levels:
    - "medium"
  max_code_size_bytes: 1048576
  allow_execution: true
  execution_timeout_seconds: 30
  max_inline_code_size_bytes: 524288

tools:
  profile: "default"
  visible_tool_budget: 40
  strict_budget_enforcement: true
  groups:
    core: true
    vba: true
    recovery: true
    names: true
