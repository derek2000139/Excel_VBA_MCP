bundles:
  foundation:
    description: "所有场景基础：服务状态与工作簿 I/O"
    domains:
      - server
      - workbook
    dependencies: []
    required: true

  names:
    description: "命名管理"
    domains:
      - names
    dependencies:
      - foundation

  edit_basic:
    description: "高频基础编辑"
    domains:
      - sheet_basic
      - range_basic
    dependencies:
      - foundation

  edit_structure:
    description: "结构编辑与高级操作"
    domains:
      - sheet_structure
      - range_structure
    dependencies:
      - foundation

  calc_format:
    description: "公式与格式"
    domains:
      - formula
      - format
    dependencies:
      - foundation

  format_rules:
    description: "条件格式规则写入"
    domains:
      - conditional_format
    dependencies:
      - foundation

  automation:
    description: "VBA 自动化"
    domains:
      - vba
    dependencies:
      - foundation

  recovery:
    description: "恢复、快照与备份"
    domains:
      - recovery
    dependencies:
      - foundation

  data:
    description: "数据查询与表格管理"
    domains:
      - pq
      - table
    dependencies:
      - foundation

  report:
    description: "报表对象（预留扩充）"
    domains:
      - chart
      - pivot
      - model
    dependencies:
      - foundation

  analysis:
    description: "分析、审计与结构扫描"
    domains:
      - analysis
    dependencies:
      - foundation

  workbook_ops:
    description: "工作簿治理与导出（v2.4 新增）"
    domains:
      - workbook_ops
    dependencies:
      - foundation
    maturity: experimental

  artifact_export:
    description: "文件包提取与导出"
    domains:
      - package
    dependencies:
      - foundation

  artifact_patch:
    description: "OOXML 文件包补丁与克隆输出"
    domains:
      - package_patch
    dependencies:
      - foundation
      - artifact_export

  batch_ops:
    description: "批量文件处理"
    domains:
      - batch
    dependencies:
      - foundation
      - artifact_export

domains:
  server:
    tools:
      - server.health
      - server.get_status
    maturity: stable
    risk_level: low

  workbook:
    tools:
      - workbook.open_file
      - workbook.create_file
      - workbook.save_file
      - workbook.close_file
      - workbook.list_open
      - workbook.inspect
    maturity: stable
    risk_level: low

  names:
    tools:
      - names.inspect
      - names.manage
      - names.create
      - names.delete
    maturity: stable
    risk_level: low

  sheet_basic:
    tools:
      - sheet.create_sheet
      - sheet.rename_sheet
      - sheet.inspect_structure
    maturity: stable
    risk_level: low

  sheet_structure:
    tools:
      - sheet.preview_delete
      - sheet.delete_sheet
      - sheet.set_auto_filter
      - sheet.get_conditional_formats
      - sheet.get_data_validations
      - sheet.copy
      - sheet.move
      - sheet.hide
      - sheet.unhide
    maturity: stable
    risk_level: low

  range_basic:
    tools:
      - range.read_values
      - range.write_values
      - range.clear_contents
      - range.copy
    maturity: stable
    risk_level: low

  range_structure:
    tools:
      - range.insert_rows
      - range.delete_rows
      - range.insert_columns
      - range.delete_columns
      - range.sort_data
      - range.merge
      - range.unmerge
      - range.find_replace
      - range.autofit
    maturity: stable
    risk_level: low

  formula:
    tools:
      - formula.set_single
      - formula.fill_range
      - formula.get_dependencies
      - formula.repair
    maturity: stable
    risk_level: low

  format:
    tools:
      - format.set_number_format
      - format.set_font
      - format.set_fill
      - format.set_border
      - format.set_alignment
      - format.set_column_width
      - format.set_row_height
    maturity: stable
    risk_level: low

  conditional_format:
    tools:
      - format.apply_conditional_rule
      - format.update_conditional_rule
      - format.copy_conditional_rules
      - format.clear_conditional_rules
    maturity: stable
    risk_level: medium
    execution_mode: file_package
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: clone_write
    supports_dry_run: true
    writes_artifact: true

  analysis:
    tools:
      - audit.list_operations
      - analysis.scan_structure
      - analysis.scan_formulas
      - analysis.scan_links
      - analysis.scan_hidden
      - analysis.export_report
    maturity: stable
    risk_level: low

  vba:
    tools:
      - vba.inspect_project
      - vba.get_module_code
      - vba.sync_module
      - vba.remove_module
      - vba.execute
      - vba.scan_code
      - vba.compile
      - vba.import_module
      - vba.export_module
    maturity: stable
    risk_level: medium

  recovery:
    tools:
      - snapshot.manage
      - snapshot.get_stats
      - snapshot.cleanup
      - rollback.manage
      - rollback.preview_snapshot
      - rollback.restore_snapshot
      - backups.manage
      - backups.restore
    maturity: stable
    risk_level: medium

  pq:
    tools:
      - pq.list_connections
      - pq.list_queries
      - pq.get_code
      - pq.update_query
      - pq.refresh
    maturity: stable
    risk_level: medium

  table:
    tools:
      - table.list_tables
      - table.create
      - table.inspect
      - table.resize
      - table.rename
      - table.set_style
      - table.toggle_total_row
      - table.delete
    maturity: experimental
    risk_level: medium

  workbook_ops:
    tools:
      - workbook.save_as
      - workbook.refresh_all
      - workbook.calculate
      - workbook.list_links
      - workbook.export_pdf
      - sheet.export_csv
    maturity: experimental
    risk_level: medium

  chart:
    tools:
      - chart.list_charts
      - chart.inspect
      - chart.list_series
      - chart.export_spec
    maturity: stable
    risk_level: low
    execution_mode: file_package
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: read_only
    supports_dry_run: true
    writes_artifact: false

  pivot:
    tools: []
    maturity: experimental
    risk_level: medium

  chart:
    tools:
      - chart.list_charts
      - chart.inspect
      - chart.list_series
      - chart.export_spec
    maturity: experimental
    risk_level: medium
    execution_mode: file_package
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: read_only
    supports_dry_run: true
    writes_artifact: false

  model:
    tools: []
    maturity: experimental
    risk_level: medium

  package:
    tools:
      - package.inspect_manifest
      - package.list_parts
      - package.get_part_xml
      - package.extract_part
      - package.list_media
      - package.list_custom_xml
      - package.detect_features
      - package.export_manifest
    maturity: stable
    risk_level: low
    execution_mode: file_package
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: read_only
    supports_dry_run: true
    writes_artifact: false

  package_patch:
    tools:
      - package.clone_with_patch
      - package.replace_shared_strings
      - package.patch_defined_names
      - package.update_docprops
      - package.merge_template_parts
      - package.remove_external_links
      - package.compare_workbooks
    maturity: stable
    risk_level: medium
    execution_mode: file_package
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: clone_write
    supports_dry_run: true
    writes_artifact: true

  batch:
    tools:
      - package.batch_extract_parts
      - package.batch_transform
      - package.batch_compare
    maturity: stable
    risk_level: medium
    execution_mode: batch
    backend_requirement: file_only
    supported_extensions:
      - .xlsx
      - .xlsm
      - .xltx
      - .xltm
    default_output_mode: clone_write
    supports_dry_run: true
    writes_artifact: true
